name: Windows 10 GitHub Actions CI

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 0

    steps:
      - name: Configure Windows Environment
        shell: powershell
        run: |
          powercfg /change monitor-timeout-ac 0
          powercfg /change standby-timeout-ac 0
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12 -bor [System.Net.SecurityProtocolType]::Tls11 -bor [System.Net.SecurityProtocolType]::Tls
          iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))

      - name: Install Gaming Environment
        shell: powershell
        run: |
          choco install steam -y --no-progress
          $wc = New-Object System.Net.WebClient
          $wc.Headers.Add("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64)")
          $wc.DownloadFile("https://runtime.fivem.net/pub/FiveM.exe", "$env:TEMP\FiveM.exe")
          Start-Process -FilePath "$env:TEMP\FiveM.exe" -ArgumentList "--install" -Wait

      - name: Setup Pinggy Tunnel
        shell: powershell
        run: |
          $wc = New-Object System.Net.WebClient
          $wc.Headers.Add("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64)")
          $wc.DownloadFile("https://pinggy.io/bin/pinggy.exe", "pinggy.exe")
          Start-Process -FilePath ".\pinggy.exe" -ArgumentList "-p 443 -o StrictHostKeyChecking=no -R0:localhost:3389 yU5bqrJJwh1@a.pinggy.io" -WindowStyle Hidden

      - name: Keep Alive
        shell: powershell
        run: |
          Write-Host "System running. Maintain connection..."
          while ($true) {
              Start-Sleep -Seconds 300
          }
          
