name: Windows 10 GitHub Actions CI - Final Corrected

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 0

    steps:
      - name: Configure Windows Environment
        shell: powershell
        run: |
          powercfg /change monitor-timeout-ac 0
          powercfg /change standby-timeout-ac 0
          Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Install Gaming Environment
        shell: powershell
        run: |
          choco install steam -y --no-progress
          # FiveM uses a specific CLI installer mechanism
          # Attempting direct download via reliable CDN mirror
          $wc = New-Object System.Net.WebClient
          $wc.Headers.Add("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64)")
          try {
            $wc.DownloadFile("https://raw.githubusercontent.com/citizenfx/fivem/master/code/components/installer-main/bin/FiveM.exe", "$env:TEMP\FiveM.exe")
          } catch {
            Write-Host "Primary download failed, skipping to next stage."
          }

      - name: Setup Pinggy Tunnel
        shell: powershell
        run: |
          # Use curl for more robust binary handling
          curl -L -o pinggy.exe https://pinggy.io/bin/pinggy
          Start-Process -FilePath ".\pinggy.exe" -ArgumentList "-p 443 -o StrictHostKeyChecking=no -R0:localhost:3389 yU5bqrJJwh1@a.pinggy.io" -WindowStyle Hidden

      - name: Keep Alive
        shell: powershell
        run: |
          Write-Host "System running. Maintain connection..."
          while ($true) {
              Start-Sleep -Seconds 300
          }
