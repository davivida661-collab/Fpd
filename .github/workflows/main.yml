name: Windows 10 GitHub Actions CI - Final Corrected

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 0

    steps:
      - name: Configure Windows Environment
        shell: powershell
        run: |
          powercfg /change monitor-timeout-ac 0
          powercfg /change standby-timeout-ac 0
          Set-ExecutionPolicy Bypass -Scope Process -Force

      - name: Install Gaming Environment
        shell: powershell
        run: |
          choco install steam -y --no-progress
          # Download FiveM using a reliable path directly
          $wc = New-Object System.Net.WebClient
          $wc.Headers.Add("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64)")
          try {
            $wc.DownloadFile("https://runtime.fivem.net/pub/FiveM.exe", "$env:TEMP\FiveM.exe")
          } catch {
            Write-Host "Primary download failed, skipping."
          }

      - name: Setup Pinggy Tunnel
        shell: powershell
        run: |
          # Use explicit .NET WebClient to avoid PowerShell 'curl' alias conflicts
          $wc = New-Object System.Net.WebClient
          $wc.Headers.Add("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64)")
          $wc.DownloadFile("https://pinggy.io/bin/pinggy", "$env:TEMP\pinggy.exe")
          Start-Process -FilePath "$env:TEMP\pinggy.exe" -ArgumentList "-p 443 -o StrictHostKeyChecking=no -R0:localhost:3389 yU5bqrJJwh1@a.pinggy.io" -WindowStyle Hidden

      - name: Keep Alive
        shell: powershell
        run: |
          Write-Host "System running. Maintain connection..."
          while ($true) {
              Start-Sleep -Seconds 300
          }
          
