# jskv technical script: Verification and Next Step Trigger
# Purpose: Confirm Chocolatey installation status and proceed with gaming suite deployment.

$logPath = "C:\ProgramData\chocolatey\logs\chocolatey.log"

if (Test-Path $logPath) {
    Write-Host "Verification: Chocolatey log found at $logPath."
    
    # Confirming installation of Steam as per requirement
    Write-Host "Initiating secondary installation of Steam and FiveM..."
    
    # Ensuring Chocolatey environment is refreshed
    refreshenv
    
    # Installing Steam if not already present
    choco install steam -y
    
    # Downloading FiveM
    Invoke-WebRequest -Uri "https://runtime.fivem.net/pub/FiveM.exe" -OutFile "$env:USERPROFILE\Desktop\FiveM.exe"
    
    Write-Host "Deployment stage complete. Proceeding to background tunnel maintenance."
} else {
    Write-Host "Error: Log file not detected. Re-running Chocolatey configuration."
}
